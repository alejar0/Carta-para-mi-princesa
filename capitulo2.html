<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Capítulo II</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="mapa.css">

</head>

<body>

    <!-- ===============================
         FONDO
    ================================ -->

    <div id="particles"></div>

    <!-- ===============================
         INTRO
    ================================ -->

    <section id="intro">

        <div class="texto">

            <h1 id="typewriter"></h1>

        </div>

    </section>

    <!-- ===============================
         ESCENA PRINCIPAL
    ================================ -->

    <section id="escena" class="hidden">

        <!-- Universo -->

        <div id="universo">

            <!-- Camino de estrellas -->

            <svg id="constelacion">

                <!-- JavaScript dibujará aquí todas las estrellas -->

            </svg>

            <!-- Armenia -->

            <div id="armenia" class="ciudad">

                <div class="heart"></div>

                <span>Armenia</span>

            </div>

            <!-- Paipa -->

            <div id="paipa" class="ciudad">

                <div class="heart"></div>

                <span>Paipa</span>

            </div>

            <!-- Partículas viajeras -->

            <div id="travelContainer"></div>

            <!-- Corazón gigante final -->

            <div id="bigHeart"></div>

        </div>

        <!-- Texto final -->

        <div id="finalText">

            <p id="finalPhrase"></p>

        </div>

        <!-- Botón -->

        <button id="continueBtn">

            Continuar →

        </button>

    </section>

    <script src="mapa.js"></script>

</body>

</html>
