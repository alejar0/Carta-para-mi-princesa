<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mientras exista un camino...</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="mapa.css">

</head>

<body>

    <!-- Fondo -->

    <div id="particles"></div>

    <!-- Mapa -->

    <div id="escenaMapa">

        <img
            src="img/colombia.png"
            id="mapaColombia"
            alt="Mapa de Colombia">

        <!-- Camino de luz -->

        <svg id="caminoSVG">

            <path id="camino"></path>

        </svg>

        <!-- Contenedor de partículas -->

        <div id="travelContainer"></div>

        <!-- Armenia -->

        <div id="armenia" class="ciudad">

            <div class="corazon">❤️</div>

            <span>Armenia</span>

        </div>

        <!-- Paipa -->

        <div id="paipa" class="ciudad">

            <div class="corazon">❤️</div>

            <span>Paipa</span>

        </div>

    </div>

    <!-- Texto -->

    <section id="mensajes">

        <h1 id="textoPrincipal"></h1>

    </section>

    <!-- Panel derecho -->

<section id="panelDerecha">

    <section id="mensajeFinal">

        <p>

            No importa cuántos kilómetros haya entre nosotros...

            <br><br>

            Siempre encontraré el camino para llegar a ti.

        </p>

    </section>

    <button id="continuar">

        Continuar 🤍

    </button>

</section>

    <script src="mapa.js"></script>

</body>

</html>
